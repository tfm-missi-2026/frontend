<UiFlex direction="column" justifyContent="center" className="flex-1 w-full max-w-md mx-auto">
  <UiFlex direction="column" gap="24px">
    <UiFlex direction="column" gap="8px">
      <UiHeader [level]="1" text="Iniciar sesión"></UiHeader>
      <UiLabel
        type="bodyS"
        color="textWeak"
        text="Ingresa tu correo electrónico y contraseña para iniciar sesión."
      ></UiLabel>
    </UiFlex>

    <form (submit)="onSubmit($event)">
      <UiFlex direction="column" gap="20px">
        @if (errorMessage()) {
          <UiAlert
            variant="error"
            title="No se pudo iniciar sesión"
            [message]="errorMessage() ?? ''"
          ></UiAlert>
        }

        <UiInput
          id="signin-email"
          name="email"
          type="email"
          labelText="Correo electrónico"
          placeholder="ejemplo@correo.com"
          [required]="true"
          [value]="email()"
          (valueChange)="onEmailChange($event)"
        ></UiInput>

        <UiInput
          id="signin-password"
          name="password"
          type="password"
          labelText="Contraseña"
          placeholder="Ingresa tu contraseña"
          [required]="true"
          [showPasswordToggle]="true"
          [value]="password()"
          (valueChange)="onPasswordChange($event)"
        ></UiInput>

        <UiFlex justifyContent="flex-end">
          <UiLink
            to="/reset-password"
            size="sm"
            variant="primary"
            underline="hover"
            (click)="onForgotPassword()"
          >
            ¿Olvidaste tu contraseña?
          </UiLink>
        </UiFlex>

        <UiButton
          [fullWidth]="true"
          [isSubmit]="true"
          [isLoading]="loading()"
          [disabled]="loading()"
        >
          Iniciar sesión
        </UiButton>
      </UiFlex>
    </form>

    <UiFlex justifyContent="center" gap="6px" className="mt-2">
      <UiLabel
        type="bodyS"
        color="textWeak"
        text="¿No tienes una cuenta?"
      ></UiLabel>
      <UiLink
        to="/signup"
        size="sm"
        variant="primary"
        underline="hover"
        (click)="onSignUp()"
      >
        Crear cuenta
      </UiLink>
    </UiFlex>
  </UiFlex>
</UiFlex>
