<div
  class="rounded-2xl border border-gray-200 bg-white px-5 pb-5 pt-5 dark:border-gray-800 dark:bg-white/[0.03] sm:px-6 sm:pt-6">
  <div class="flex flex-col gap-5 mb-6 sm:flex-row sm:justify-between">
    <div class="w-full">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
        Statistics
      </h3>
      <p class="mt-1 text-gray-500 text-theme-sm dark:text-gray-400">
        Target you’ve set for each month
      </p>
    </div>
    <div class="flex items-start w-full gap-3 sm:justify-end">
      <!-- ChartTab -->
      <app-chart-tab />

      <!-- date pricker -->
        <div class="relative max-w-40">
            <input #datepicker class="h-10 w-full max-w-11 rounded-lg border border-gray-200 bg-white py-2.5 pl-[34px] pr-4 text-theme-sm font-medium text-gray-700 shadow-theme-xs focus:outline-hidden focus:ring-0 focus-visible:outline-hidden dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 xl:max-w-fit xl:pl-11" placeholder="Select dates" data-class="flatpickr-right" readonly="readonly" />
            <div class="absolute inset-0 right-auto flex items-center pointer-events-none left-4">
                <IconCalendar className="fill-gray-700 dark:fill-gray-400" [size]="20" />
            </div>
        </div>
        
    </div>
  </div>

  <div class="max-w-full overflow-x-auto custom-scrollbar">
    <div class="min-w-[1000px] xl:min-w-full">
      <apx-chart [series]="series" [chart]="chart" [colors]="colors" [stroke]="stroke" [fill]="fill" [markers]="markers"
        [grid]="grid" [dataLabels]="dataLabels" [tooltip]="tooltip" [xaxis]="xaxis" [yaxis]="yaxis"
        [legend]="legend"></apx-chart>
    </div>
  </div>
</div>
