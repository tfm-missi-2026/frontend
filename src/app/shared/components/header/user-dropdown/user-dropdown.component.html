<div class="relative">
  <button (click)="toggleDropdown()" class="flex items-center text-gray-700 dropdown-toggle dark:text-gray-400">
    <span class="mr-3 overflow-hidden rounded-full h-11 w-11">
      <img src="/images/user/owner.png" alt="User" />
    </span>
    <span class="block mr-1 font-medium text-theme-sm">Musharof</span>
    <IconChevronDown
      [width]="18"
      [height]="20"
      [className]="(isOpen ? 'rotate-180 ' : '') + 'stroke-gray-500 dark:stroke-gray-400 transition-transform duration-200'"
    />
  </button>

  <UiDropdown [isOpen]="isOpen" (close)="closeDropdown()"
    className="absolute right-0 mt-[17px] flex w-[260px] flex-col rounded-2xl border border-gray-200 bg-white p-3 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark">
    <div>
      <span class="block font-medium text-gray-700 text-theme-sm dark:text-gray-400">
        Musharof Chowdhury
      </span>
      <span class="mt-0.5 block text-theme-xs text-gray-500 dark:text-gray-400">
        randomuser&#64;pimjo.com
      </span>
    </div>

    <ul class="flex flex-col gap-1 pt-4 pb-3 border-b border-gray-200 dark:border-gray-800">
      <li>
        <UiDropdownItem (itemClick)="closeDropdown()" [to]="'/profile'"
          className="flex items-center gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
          <IconUserCircle className="fill-gray-500 group-hover:fill-gray-700 dark:fill-gray-400 dark:group-hover:fill-gray-300" />
          Edit profile
        </UiDropdownItem>
      </li>
      <li>
        <UiDropdownItem (itemClick)="closeDropdown()" [to]="'/profile'"
          className="flex items-center gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
          <IconSettings className="fill-gray-500 group-hover:fill-gray-700 dark:fill-gray-400 dark:group-hover:fill-gray-300" />
          Account Settings
        </UiDropdownItem>
      </li>
      <li>
        <UiDropdownItem (itemClick)="closeDropdown()" [to]="'/profile'"
          className="flex items-center gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
          <IconInfoCircleBorder className="fill-gray-500 group-hover:fill-gray-700 dark:fill-gray-400 dark:group-hover:fill-gray-300" />
          Support
        </UiDropdownItem>
      </li>
    </ul>
    <a routerLink="/signin"
      class="flex items-center gap-3 px-3 py-2 mt-3 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
      <IconLogout className="fill-gray-500 group-hover:fill-gray-700 dark:group-hover:fill-gray-300" />
      Sign out
    </a>
  </UiDropdown>
</div>
