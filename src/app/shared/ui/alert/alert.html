<div [class]="containerClasses()" data-testid="alert">
  <UiFlex [alignItems]="'flex-start'" [gap]="'12px'">
    <div [class]="iconClasses()">
      @switch (variant()) {
        @case ('success') {
          <IconSuccess [size]="24" />
        }
        @case ('error') {
          <IconError [size]="24" />
        }
        @case ('warning') {
          <IconWarning [size]="24" />
        }
        @case ('info') {
          <IconInfoCircle [size]="24" />
        }
      }
    </div>

    <UiFlex [direction]="'column'" [gap]="'2px'">
      @if (title()) {
        <UiLabel
          [type]="'bodyXs'"
          [weight]="'semibold'"
          [color]="'textStrong'"
          [text]="title()"
        ></UiLabel>
      }

      <UiLabel
        [type]="'bodyS'"
        [color]="'textWeak'"
        [text]="message()"
      ></UiLabel>

      @if (showLink()) {
        <a
          [routerLink]="linkHref()"
          class="inline-block mt-3 text-sm font-medium text-gray-500 underline dark:text-gray-400"
        >
          {{ linkText() }}
        </a>
      }
    </UiFlex>
  </UiFlex>
</div>
