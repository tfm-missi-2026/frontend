<!--
  Template del UiInput.
  Estructura:
    <outer>           → StyledControlContainer (col + gap[1] + flex/width)
      <UiFormLabel>   → solo si hay `labelText`
      <container>     → StyledInputContainer (frame con borde, focus, error)
        <leftIcon>    → ngComponentOutlet si `leftIcon`
        <UiFlex>      → prefix | <input> | sufix
        <errorIcon>   → ValidationErrorIcon si `errorMessage`
        <rightIcon>   → ngComponentOutlet si `rightIcon`
      </container>
      <UiFlex footer> → legend | charCount (si hay `legend` o `maxLength`)
    </outer>
-->

<div
  [class]="outerClasses()"
  [style]="outerStyles()"
  data-testid="input-wrapper"
>
  @if (labelText(); as lt) {
    <UiFormLabel
      [labelText]="lt"
      [labelFor]="id() || ''"
      [required]="required()"
      [disabled]="isDisabled()"
      [readOnly]="readOnly()"
      [tooltip]="tooltip()"
    ></UiFormLabel>
  }

  <div
    [class]="containerClasses()"
    [style]="containerStyles()"
    data-testid="input-container"
  >
    @if (leftIcon()) {
      <span
        class="inline-flex items-center justify-center shrink-0"
        [style.color]="iconColor()"
      >
        <ng-container
          *ngComponentOutlet="leftIcon() ?? null; inputs: leftIconInputs()"
        ></ng-container>
      </span>
    }

    <UiFlex [gap]="'4px'" [flex]="'1'">
      @if (prefix(); as pfx) {
        <UiLabel
          type="bodyS"
          as="span"
          color="textAction"
          [text]="pfx"
        ></UiLabel>
      }

      <input
        #inputEl
        [class]="inputClasses()"
        [id]="id() || null"
        [name]="name() || null"
        [type]="effectiveType()"
        [placeholder]="placeholder() || null"
        [disabled]="isDisabled()"
        [readonly]="readOnly()"
        [attr.autocomplete]="autocomplete() || null"
        [attr.maxlength]="maxLength() || null"
        [value]="internalValue"
        (input)="onInput($event)"
        (keydown)="onKeyDownHandler($event)"
        (focus)="onFocusHandler()"
        (blur)="onBlurHandler()"
        data-testid="input"
      />

      @if (sufix(); as sfx) {
        <UiLabel
          type="bodyS"
          as="span"
          color="textAction"
          [text]="sfx"
        ></UiLabel>
      }
    </UiFlex>

    @if (hasError()) {
      <ValidationErrorIcon
        [errorMessage]="errorMessage()!"
      ></ValidationErrorIcon>
    }

    @if (rightIcon()) {
      <span
        class="inline-flex items-center justify-center shrink-0"
        [style.color]="iconColor()"
      >
        <ng-container
          *ngComponentOutlet="rightIcon() ?? null; inputs: rightIconInputs()"
        ></ng-container>
      </span>
    }

    @if (shouldShowPasswordToggle()) {
      <button
        type="button"
        class="inline-flex items-center justify-center shrink-0 p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors"
        [attr.aria-label]="currentPasswordToggleLabel()"
        [attr.aria-pressed]="_passwordVisible()"
        (click)="togglePasswordVisibility()"
        data-testid="input-password-toggle"
      >
        <ng-container
          *ngComponentOutlet="currentPasswordIcon(); inputs: rightIconInputs()"
        ></ng-container>
      </button>
    }
  </div>

  @if (legend() || maxLength()) {
    <UiFlex [justifyContent]="footerJustifyContent()">
      @if (legend(); as lgd) {
        <UiLabel
          type="bodyXxs"
          color="textWeakest"
          [text]="lgd"
          [weight]="legendWeight"
        ></UiLabel>
      }
      @if (maxLength()) {
        <span class="self-end">
          <UiLabel
            type="bodyXxs"
            [color]="charCountColor()"
            [text]="charCountText()"
            [weight]="charCountWeight"
          ></UiLabel>
        </span>
      }
    </UiFlex>
  }
</div>
