<aside
  class="fixed flex flex-col top-0 px-5 left-0 bg-white dark:bg-gray-900 dark:border-gray-800 text-gray-900 h-screen transition-all duration-300 ease-in-out z-50 border-r border-gray-200"
  [ngClass]="{
    'w-72.5': isVisible(),
    'w-22.5': !isVisible(),
    'translate-x-0': isMobileOpen(),
    '-translate-x-full': !isMobileOpen(),
    'xl:translate-x-0': true,
  }"
  (mouseenter)="onSidebarMouseEnter()"
  (mouseleave)="sidebarService.setHovered(false)"
>
  <SidebarLayoutLogo [isExpandedOrHovered]="isVisible()" />

  <UiFlex
    direction="column"
    overflow="auto"
    className="flex-1 no-scrollbar"
  >
    <nav class="mb-6">
      <UiFlex direction="column" gap="16px">
        @for (s of sections; track s.sectionKey) {
          <SidebarLayoutSection
            [title]="s.title"
            [items]="s.items"
            [sectionKey]="s.sectionKey"
            [isExpandedOrHovered]="isVisible()"
            [sectionIcon]="sectionIcon"
          />
        }
      </UiFlex>
    </nav>

    @if (isVisible()) {
      <SidebarLayoutWidget />
    }
  </UiFlex>
</aside>
