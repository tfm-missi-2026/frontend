<div
  class="relative h-[calc(100vh-134px)] xl:h-[calc(100vh-146px)] px-4 xl:flex xl:px-0"
>
  <div
    class="my-6 flex items-center justify-between rounded-2xl border border-gray-200 bg-white p-3 xl:hidden dark:border-gray-800 dark:bg-gray-900"
  >
    <UiHeader
      [level]="4"
      text="Historial de chats"
      color="textStrong"
      className="pl-2"
    />
    <UiIconButton
      variant="tertiary"
      [Icon]="hamburgerIcon"
      (click)="toggleSidebar()"
      labelText="Alternar barra lateral"
    />
  </div>

  <div class="flex-1 xl:py-10">
    <div class="relative mx-auto items-center max-w-180">
      <ng-content></ng-content>
      <div
        class="fixed bottom-5 lg:bottom-10 left-1/2 z-20 w-full -translate-x-1/2 transform px-4 sm:px-6 lg:px-8"
      >
        <div
          class="mx-auto w-full max-w-180 rounded-2xl border border-gray-200 bg-white p-5 shadow-xs dark:border-gray-800 dark:bg-gray-800"
        >
          <UiTextArea
            placeholder="Escribe tu mensaje aquí..."
            [rows]="4"
            [resize]="'none'"
          />

          <UiFlex justify="between" align="center" className="pt-2">
            <UiButton
              variant="tertiary"
              [LeftIcon]="attachIcon"
              label="Adjuntar"
              [compact]="true"
            />

            <UiIconButton
              variant="primary"
              [Icon]="sendIcon"
              labelText="Enviar mensaje"
            />
          </UiFlex>
        </div>
      </div>
    </div>
  </div>
</div>
