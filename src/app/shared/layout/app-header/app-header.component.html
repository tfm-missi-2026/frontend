<header
  class="sticky top-0 flex w-full bg-white border-gray-200 z-99999 dark:border-gray-800 dark:bg-gray-900 xl:border-b"
>
  <div
    class="flex flex-col items-center justify-between grow xl:flex-row xl:px-6"
  >
    <div
      class="flex items-center justify-between w-full gap-2 px-3 py-3 border-b border-gray-200 dark:border-gray-800 sm:gap-4 xl:justify-normal xl:border-b-0 xl:px-0 lg:py-4"
    >
      <UiIconButton
        variant="tertiary"
        [compact]="true"
        [Icon]="isMobileOpen() ? closeIcon : hamburgerIcon"
        [className]="'xl:border z-99999 ' + mobileToggleBgClass()"
        labelText="Alternar barra lateral"
        (click)="handleToggle()"
      />

      <a routerLink="/" class="xl:hidden">
        <UiImage
          src="/images/logo/logo.svg"
          alt="Logo SPSRT"
          width="w-auto"
          height="h-auto"
          rounded="none"
          [bordered]="false"
          className="dark:hidden"
        />
        <UiImage
          src="/images/logo/logo-dark.svg"
          alt="Logo SPSRT"
          width="w-auto"
          height="h-auto"
          rounded="none"
          [bordered]="false"
          className="hidden dark:block"
        />
      </a>

      <UiIconButton
        variant="tertiary"
        [compact]="true"
        [Icon]="dotsIcon"
        className="xl:hidden"
        labelText="Alternar menú de aplicación"
        (click)="toggleApplicationMenu()"
      />

      <div class="hidden xl:block">
        <form>
          <div class="relative">
            <span
              class="absolute -translate-y-1/2 pointer-events-none left-4 top-1/2"
            >
              <IconSearch
                className="fill-gray-500 dark:fill-gray-400"
                [size]="20"
              />
            </span>
            <input
              #searchInput
              type="text"
              placeholder="Buscar o escribir un comando..."
              class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 pl-12 pr-14 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 xl:w-107.5"
            />
            <button
              type="button"
              tabindex="-1"
              aria-hidden="true"
              class="absolute right-2.5 top-1/2 inline-flex -translate-y-1/2 items-center gap-0.5 rounded-lg border border-gray-200 bg-gray-50 px-1.75 py-[4.5px] text-xs tracking-[-0.2px] text-gray-500 dark:border-gray-800 dark:bg-white/3 dark:text-gray-400"
            >
              <span> ⌘ </span>
              <span> K </span>
            </button>
          </div>
        </form>
      </div>
    </div>
    <div
      [ngClass]="isApplicationMenuOpen() ? 'flex' : 'hidden'"
      class="items-center justify-between w-full gap-4 px-5 py-4 xl:flex shadow-theme-md xl:justify-end xl:px-0 xl:shadow-none"
    >
      <UiFlex align="center" gap="0.75rem">
        <CommonThemeToggle variant="subtle" />
        <HeaderNotificationDropdown
          [items]="notifications"
          [notifying]="true"
        />
      </UiFlex>
      <HeaderUserDropdown
        [user]="currentUser"
        [menuItems]="userMenuItems"
        [actionItem]="signOutItem"
      />
    </div>
  </div>
</header>
