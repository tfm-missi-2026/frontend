<div class="mb-6 rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
  <div class="flex flex-col justify-between gap-5 px-6 py-5 sm:flex-row sm:items-start">
    <div>
      <h3 class="text-base font-medium text-gray-800 dark:text-white/90">
        Payment Methods
      </h3>
    </div>
    <div>
      <button
        type="button"
        class="shadow-theme-xs flex w-full justify-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-gray-800 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200"
      >
        <IconPlusSimple [size]="21" />
        Add New Card
      </button>
    </div>
  </div>
  <div class="border-t border-gray-200 p-4 sm:p-6 dark:border-gray-800">
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <!-- Master -->
      <div class="flex gap-5 rounded-xl border border-gray-200 p-3 pr-5 dark:border-gray-800">
        <div class="inline-flex h-13 w-13 shrink-0 items-center justify-center rounded-lg border border-gray-200 dark:border-gray-800">
          <IconMastercard [size]="33" [width]="33" [height]="32" />
        </div>
        <div>
          <h3 class="mb-2 flex items-center gap-2 text-gray-800 dark:text-white/90">
            Mastercard
            <span class="bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-500 inline-flex items-center justify-center gap-1 rounded-full py-0.5 pr-2.5 pl-2 text-sm font-medium">
              <IconCheckSmall [size]="13" [width]="13" [height]="12" />
              Default
            </span>
          </h3>
          <div class="flex flex-wrap items-center justify-between gap-5">
            <p class="text-sm font-normal text-gray-400 dark:text-gray-400">
              **** **** **** 9029
            </p>
            <p class="text-sm font-normal text-gray-400 dark:text-gray-400">
              Expiry 01/24
            </p>
          </div>
          <div class="mt-4 flex flex-wrap gap-3">
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Edit
            </button>
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Delete
            </button>
          </div>
        </div>
      </div>

      <!-- Visa -->
      <div class="flex gap-5 rounded-xl border border-gray-200 p-3 pr-5 dark:border-gray-800">
        <div class="inline-flex h-13 w-13 shrink-0 items-center justify-center rounded-lg border border-gray-200 dark:border-gray-800">
          <IconVisa [width]="33" [height]="18" />
        </div>
        <div>
          <h3 class="mb-2 text-gray-800 dark:text-white/90">Visa</h3>
          <div class="flex flex-wrap items-center justify-between gap-5">
            <p class="text-sm font-normal text-gray-400 dark:text-gray-400">
              **** **** **** 4328
            </p>
            <p class="text-sm font-normal text-gray-400 dark:text-gray-400">
              Expiry 01/25
            </p>
          </div>
          <div class="mt-4 flex flex-wrap gap-3">
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Make Default
            </button>
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Edit
            </button>
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Delete
            </button>
          </div>
        </div>
      </div>

      <!-- Paypal -->
      <div class="flex gap-5 rounded-xl border border-gray-200 p-3 pr-5 dark:border-gray-800">
        <div class="inline-flex h-13 w-13 shrink-0 items-center justify-center rounded-lg border border-gray-200 dark:border-gray-800">
          <IconPaypal [width]="33" [height]="32" />
        </div>
        <div>
          <h3 class="mb-2 text-gray-800 dark:text-white/90">Paypal</h3>
          <div>
            <p class="text-sm font-normal text-gray-400 dark:text-gray-400">
              name@example.com
            </p>
          </div>
          <div class="mt-4 flex flex-wrap gap-3">
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Make Default
            </button>
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Edit
            </button>
            <button class="shadow-theme-xs inline-flex h-6 items-center justify-center rounded-md border border-gray-300 px-3 py-1 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
